name: Lint

on:
  pull_request:

jobs:
  rumdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rvben/rumdl@v0
        with:
          report-type: annotations

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          sudo curl -sSL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          sudo chmod +x /usr/local/bin/shfmt
          shfmt --version
      - name: Check shell script formatting (Google style)
        run: shfmt -i 2 -ci -bn -d .
